<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico?v=4" sizes="any" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=4" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png?v=4" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png?v=4" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=4" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- لون الواجهة وهوية Apple (Safari / Siri / الشاشة الرئيسية) -->
    <meta name="theme-color" content="#F4EDE2" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <!-- خلفية كريمية من أول لحظة (تمنع وميض/شاشة سوداء عند الإقلاع قبل تحميل CSS) -->
    <style>html,body,#root{background-color:#F4EDE2;margin:0;}</style>
    <meta name="apple-mobile-web-app-title" content="Bazara" />
    <meta name="application-name" content="Bazara" />

    <!-- الخطوط مستضافة داخل التطبيق (مستوردة في main.jsx وتُخزَّن بالـ Service Worker) —
         أُزيلت روابط خطوط Google: كانت تعتمد على الشبكة فتختفي النصوص/يتبدّل الخط عند بطئها. -->
    <link rel="preconnect" href="https://res.cloudinary.com" crossorigin />
    <link rel="dns-prefetch" href="https://res.cloudinary.com" />

    <!-- وسوم meta افتراضية (تُحدَّث ديناميكياً عبر react-helmet-async) -->
    <title>بازارا (Bazara) — منصة وأزياء فاخرة | بازارا</title>
    <meta name="description" content="بازارا (Bazara): منصة المتاجر الإلكترونية للأزياء الفاخرة. أنشئ متجر بازارا الخاص بك خلال دقائق وشاركه مع زبائنك." />
    <meta name="keywords" content="بازارا, Bazara, متجر بازارا, أزياء بازارا, بازارا أونلاين" />
    <script type="application/ld+json">
      {"@context":"https://schema.org","@type":"WebSite","name":"بازارا","alternateName":"Bazara","url":"https://bazarastore.site/","inLanguage":"ar","potentialAction":{"@type":"SearchAction","target":"https://bazarastore.site/shop?q={search_term_string}","query-input":"required name=search_term_string"}}
    </script>
    <script type="application/ld+json">
      {"@context":"https://schema.org","@type":"Organization","name":"بازارا","alternateName":"Bazara","url":"https://bazarastore.site/","logo":"https://bazarastore.site/icon-512.png"}
    </script>
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Bazara" />
    <meta property="og:title" content="Bazara — وجهتك للأزياء الفاخرة" />
    <meta property="og:description" content="منصة المتاجر الإلكترونية للأزياء الفاخرة." />
    <meta property="og:url" content="https://bazarastore.site/" />
    <meta property="og:image" content="https://bazarastore.site/og-cover.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="ar_AR" />
    <link rel="canonical" href="https://bazarastore.site/" />
  </head>
  <body>
    <div id="root">
      <!-- شاشة تحميل كريمية فورية (تظهر قبل تحميل التطبيق بدل الشاشة السوداء) -->
      <div id="boot-splash" style="position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#F4EDE2;gap:20px;">
        <div style="font-family:'El Messiri',serif;font-size:42px;font-weight:800;color:#5e4636;letter-spacing:1px;">Bazara</div>
        <div style="width:30px;height:30px;border:3px solid rgba(94,70,54,0.2);border-top-color:#5e4636;border-radius:50%;animation:bz-spin 0.8s linear infinite;"></div>
      </div>
    </div>
    <style>@keyframes bz-spin{to{transform:rotate(360deg)}}</style>
    <!-- مِظلّة أمان مضمّنة (خارج الـ bundle): إن بقيت شاشة الإقلاع عالقة (فشل تحميل
         الأكواد — غالباً service worker قديم يخدم ملفات محذوفة)، نتعافى تلقائياً:
         محاولة (1) إعادة تحميل بسيطة، (2) تنظيف الكاش وإلغاء الـ SW ثم إعادة التحميل،
         ثم نتوقّف لتفادي أي حلقة. تُصفَّر العدّاد عند نجاح الإقلاع. -->
    <script>
      (function () {
        var KEY = 'bz_boot_recover';
        var fired = false;
        function attempt() {
          if (fired) return;
          if (!document.getElementById('boot-splash')) return; // أقلع بنجاح
          fired = true;
          var n = parseInt(sessionStorage.getItem(KEY) || '0', 10);
          if (n >= 2) return; // جرّبنا مرتين → خطأ حقيقي، لا نكرّر
          sessionStorage.setItem(KEY, String(n + 1));
          if (n === 0) { location.reload(); return; } // محاولة بسيطة أولاً
          var done = function () { location.reload(); };
          var jobs = [];
          try {
            if (window.caches && caches.keys) jobs.push(caches.keys().then(function (ks) { return Promise.all(ks.map(function (k) { return caches.delete(k); })); }));
            if (navigator.serviceWorker && navigator.serviceWorker.getRegistrations) jobs.push(navigator.serviceWorker.getRegistrations().then(function (rs) { return Promise.all(rs.map(function (r) { return r.unregister(); })); }));
            Promise.all(jobs).then(done, done);
            setTimeout(done, 2500);
          } catch (e) { done(); }
        }
        // فشل تحميل ملف أكواد أثناء الإقلاع (كاش ممسوح/نسخة قديمة) → تعافٍ فوري
        // بدل انتظار المهلة كاملة — كان المستخدم يعلق ١٢ ثانية قبل أول محاولة.
        window.addEventListener('error', function (e) {
          var el = e.target;
          if (el && (el.tagName === 'SCRIPT' || el.tagName === 'LINK') && String(el.src || el.href || '').indexOf('/assets/') !== -1) attempt();
        }, true);
        // مهلة أقصر بعد اكتمال التحميل + مهلة مطلقة احتياطية (لو علِق التحميل نفسه فلا يصل حدث load)
        window.addEventListener('load', function () { setTimeout(attempt, 7000); });
        setTimeout(attempt, 15000);
        // عند نجاح الإقلاع لاحقاً نصفّر العدّاد (يسمح بتعافٍ مستقبلي)
        var iv = setInterval(function () {
          if (!document.getElementById('boot-splash')) { sessionStorage.removeItem(KEY); clearInterval(iv); }
        }, 1000);
        setTimeout(function () { clearInterval(iv); }, 20000);
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
