<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bazaraGold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e6c878"/>
      <stop offset="0.5" stop-color="#d4af37"/>
      <stop offset="1" stop-color="#b8932c"/>
    </linearGradient>
    <radialGradient id="bazaraIvory" cx="0.38" cy="0.3" r="0.95">
      <stop offset="0" stop-color="#FFFDF7"/>
      <stop offset="1" stop-color="#F0E7D5"/>
    </radialGradient>
  </defs>
  <!-- خلفية بنّية (لا تغيّر fill هنا — سكربت gen-app-assets يعتمد عليه لإزالة الخلفية) -->
  <rect width="100" height="100" rx="20" fill="#5e4636"/>
  <!-- الختم بهامش مريح داخل المربّع (أيقونة تطبيق متناسقة — ليس مزنوقاً على الحواف) -->
  <circle cx="50" cy="50" r="36" fill="url(#bazaraIvory)" stroke="url(#bazaraGold)" stroke-width="2.6"/>
  <circle cx="50" cy="50" r="31.6" fill="none" stroke="url(#bazaraGold)" stroke-width="0.9" opacity="0.75"/>
  <!-- B منقوشة: ظل ذهبي مزاح خلف الخمرية -->
  <text x="51.3" y="51.3" text-anchor="middle" dominant-baseline="central"
        font-family="Georgia, 'Times New Roman', serif" font-weight="700"
        font-size="35" fill="url(#bazaraGold)" opacity="0.85">B</text>
  <text x="50" y="50" text-anchor="middle" dominant-baseline="central"
        font-family="Georgia, 'Times New Roman', serif" font-weight="700"
        font-size="35" fill="#4a3628">B</text>
  <!-- قوس ذهبي سفلي بماستين -->
  <path d="M36 65 Q50 71.5 64 65" fill="none" stroke="url(#bazaraGold)" stroke-width="1.9" stroke-linecap="round"/>
  <path d="M31.7 60.6 l1.6 1.6 -1.6 1.6 -1.6 -1.6 Z" fill="url(#bazaraGold)"/>
  <path d="M68.3 60.6 l1.6 1.6 -1.6 1.6 -1.6 -1.6 Z" fill="url(#bazaraGold)"/>
</svg>
